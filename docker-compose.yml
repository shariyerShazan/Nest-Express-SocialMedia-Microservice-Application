
# ─── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_auth_data:
  postgres_notification_data:
  mongo_data:
  redis_data:
  rabbitmq_data:

# ─── Bridge Networks ────────────────────────────────────────────────────────────
networks:
  app_network:        # All services talk through here
    driver: bridge
  db_network:         # Isolated from public - DBs only
    driver: bridge
  admin_network:      # Admin services on separate channel
    driver: bridge

services:

  # ════════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════════════

  # ─── PostgreSQL (Auth Service DB) ─────────────────────────────────────────
  postgres-auth:
    image: postgres:15-alpine
    container_name: facebook_postgres_auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-facebook_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-facebook_auth}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-facebook_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL (Notification Service DB) ─────────────────────────────────
  postgres-notifications:
    image: postgres:15-alpine
    container_name: facebook_postgres_notifications
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-facebook_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
      POSTGRES_DB: ${POSTGRES_NOTIFICATION_DB:-facebook_notifications}
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-facebook_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: facebook_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongopassword123}
    volumes:
      - mongo_data:/data/db
    networks:
      - db_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/facebook-posts --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: facebook_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network
      - db_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: facebook_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rabbit_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbit_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672"
    networks:
      - app_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── NGINX API Gateway ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: facebook_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/auth-service/uploads:/var/www/uploads/profiles:ro
      - ./services/post-service/uploads:/var/www/uploads/posts:ro
    networks:
      - app_network
      - admin_network
    depends_on:
      - auth-service
      - post-service
      - chat-service
      - notification-service
      - admin-service

  # ════════════════════════════════════════════════════════════════════════════
  # CORE MICROSERVICES
  # ════════════════════════════════════════════════════════════════════════════

  # ─── Auth Service ─────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: facebook_auth_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-facebook_admin}:${POSTGRES_PASSWORD:-strongpassword123}@postgres-auth:5432/${POSTGRES_AUTH_DB:-facebook_auth}
      JWT_SECRET: ${JWT_SECRET:-super_secret_for_all_services_change_this_in_prod}
      REDIS_URL: redis://redis:6379
    networks:
      - app_network
      - db_network
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Post Service ──────────────────────────────────────────────────────────
  post-service:
    build:
      context: ./services/post-service
      dockerfile: Dockerfile
    container_name: facebook_post_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-mongouser}:${MONGO_INITDB_ROOT_PASSWORD:-mongopassword123}@mongodb:27017/facebook-posts?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_for_all_services_change_this_in_prod}
      REDIS_URL: redis://redis:6379
    networks:
      - app_network
      - db_network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Chat Service ─────────────────────────────────────────────────────────
  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: facebook_chat_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-mongouser}:${MONGO_INITDB_ROOT_PASSWORD:-mongopassword123}@mongodb:27017/facebook-chat?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_for_all_services_change_this_in_prod}
      REDIS_URL: redis://redis:6379
    networks:
      - app_network
      - db_network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Notification Service ────────────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: facebook_notification_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-facebook_admin}:${POSTGRES_PASSWORD:-strongpassword123}@postgres-notifications:5432/${POSTGRES_NOTIFICATION_DB:-facebook_notifications}
      JWT_SECRET: ${JWT_SECRET:-super_secret_for_all_services_change_this_in_prod}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-rabbit_admin}:${RABBITMQ_DEFAULT_PASS:-rabbit_password}@rabbitmq:5672
    networks:
      - app_network
      - db_network
    depends_on:
      postgres-notifications:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Admin Service (Consolidated) ─────────────────────────────────────────
  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    container_name: facebook_admin_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-facebook_admin}:${POSTGRES_PASSWORD:-strongpassword123}@postgres-auth:5432/${POSTGRES_AUTH_DB:-facebook_auth}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-mongouser}:${MONGO_INITDB_ROOT_PASSWORD:-mongopassword123}@mongodb:27017/facebook-posts?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_for_all_services_change_this_in_prod}
      REDIS_URL: redis://redis:6379
    networks:
      - app_network
      - admin_network
      - db_network
    depends_on:
      postgres-auth:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
