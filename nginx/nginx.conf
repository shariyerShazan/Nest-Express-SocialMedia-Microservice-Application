events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Upstream Definitions ────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:3001;
    }

    upstream post_service {
        server post-service:3002;
    }

    upstream chat_service {
        server chat-service:3003;
    }

    upstream notification_service {
        server notification-service:3004;
    }

    upstream admin_service {
        server admin-service:4001;
    }

    # ─── Rate Limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    server {
        listen 80;
        server_name _;

        # Global headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # ─── Static Files (Uploads) ───────────────────────────────────────
        # Faster delivery of images directly by Nginx
        location /uploads/profiles/ {
            alias /var/www/uploads/profiles/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /uploads/posts/ {
            alias /var/www/uploads/posts/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ─── Auth Service Routes ───────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Post/Feed Service Routes ──────────────────────────────────────
        location /api/v1/posts/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://post_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/feed/ {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://post_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Chat Service Routes (HTTP + WebSocket) ────────────────────────
        location /api/v1/chat/ {
            proxy_pass http://chat_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Socket.IO - Chat
        location /socket.io/chat/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # ─── Notification Service Routes ───────────────────────────────────
        location /api/v1/notifications/ {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ─── Admin Routes (Consolidated) ───────────────────────────────────
        location /api/v1/admin/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Health Check ──────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
